name: Ruby

on:
  push:
    branches: [main]
    paths:
      - ruby/Dockerfile
  pull_request:
    paths:
      - ruby/Dockerfile
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ruby

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        ruby-version: ["3.4.8", "3.3.7"]
        include:
          - ruby-version: "3.4.8"
            latest: true
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate tags
        id: tags
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          VERSION="${{ matrix.ruby-version }}"
          MINOR="${VERSION%.*}"

          RUNTIME="${IMAGE}:${VERSION},${IMAGE}:${MINOR}"
          BUILD="${IMAGE}:${VERSION}-build,${IMAGE}:${MINOR}-build"
          if [ "${{ matrix.latest }}" = "true" ]; then
            RUNTIME="${RUNTIME},${IMAGE}:latest"
            BUILD="${BUILD},${IMAGE}:latest-build"
          fi

          echo "runtime=${RUNTIME}" >> "$GITHUB_OUTPUT"
          echo "build=${BUILD}" >> "$GITHUB_OUTPUT"

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: ruby
          target: base
          build-args: RUBY_VERSION=${{ matrix.ruby-version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.runtime }}

      - name: Build and push build image
        uses: docker/build-push-action@v7
        with:
          context: ruby
          target: build
          build-args: RUBY_VERSION=${{ matrix.ruby-version }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.build }}
